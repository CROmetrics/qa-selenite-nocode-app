<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Screenshot</title>
<style>
  :root { color-scheme: light dark; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #16181d; display: flex; align-items: center; justify-content: center;
  }
  img { max-width: 100%; max-height: 100vh; object-fit: contain; }
  .msg {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    color: #9aa0aa; font-size: 14px; padding: 24px; text-align: center;
  }
</style>
</head>
<body>
  <img id="ta-image" alt="Screenshot" style="display:none">
  <div id="ta-image-msg" class="msg">Loading image…</div>
  <script src="image.js"></script>
</body>
</html>
